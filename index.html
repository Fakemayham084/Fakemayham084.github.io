<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden; /* Prevent scrolling */
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #333;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1; /* Ensure buttons are above the background */
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            text-align: center;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        nav a.active {
            background-color: rgba(255, 255, 255, 0.5);
            color: white;
        }
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allow clicks to pass through the background */
            background-color: #4a90e2; /* Mid-blue color */
        }
        .shape {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            animation: fall 5s linear infinite; /* Shape falling animation */
        }
        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 0;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </nav>
    <h1>Welcome to the Home Page</h1>
    <p>This is the home page.</p>

    <!-- Falling shapes animation -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const navLink = document.querySelector('nav a[href="index.html"]');
            if (navLink) {
                navLink.classList.add('active');
            }

            const background = document.querySelector('.background');
            if (background) {
                for (let i = 0; i < 250; i++) { // Adjust the number of shapes as needed
                    const shape = document.createElement('div');
                    shape.classList.add('shape');
                    shape.style.left = `${Math.random() * 100}vw`; // Random horizontal position
                    shape.style.animationDuration = `${Math.random() * 2 + 1}s`; // Random animation duration
                    background.appendChild(shape);
                }
            }
        });
    </script>
</body>
</html>
